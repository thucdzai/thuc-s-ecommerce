# version: '3.8'

services:
  # 0. Message Broker dùng chung cho giao tiếp bất đồng bộ giữa các service (KRaft mode - không cần Zookeeper)
  # Lưu ý: bitnami/kafka:3.7 đã bị gỡ khỏi Docker Hub (Bitnami chuyển sang "Secure Images" trả phí),
  # nên đổi sang image chính chủ apache/kafka — cấu hình KRaft tương đương, dùng tiền tố KAFKA_ thay vì KAFKA_CFG_.
  kafka:
    image: apache/kafka:3.7.0
    container_name: tttn_kafka
    ports:
      - "9092:9092"
    environment:
      - KAFKA_NODE_ID=0
      - KAFKA_PROCESS_ROLES=controller,broker
      - KAFKA_LISTENERS=PLAINTEXT://:9092,CONTROLLER://:9093
      - KAFKA_ADVERTISED_LISTENERS=PLAINTEXT://kafka:9092
      - KAFKA_CONTROLLER_QUORUM_VOTERS=0@kafka:9093
      - KAFKA_CONTROLLER_LISTENER_NAMES=CONTROLLER
      - KAFKA_LISTENER_SECURITY_PROTOCOL_MAP=CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      - KAFKA_INTER_BROKER_LISTENER_NAME=PLAINTEXT
      - KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR=1
      - KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR=1
      - KAFKA_TRANSACTION_STATE_LOG_MIN_ISR=1
      - KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS=0
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-topics.sh --bootstrap-server localhost:9092 --list"]
      interval: 10s
      timeout: 10s
      retries: 10
    volumes:
      - kafka_data:/var/lib/kafka/data

  # 0b. Redis — cache truy vấn lặp lại (danh sách/chi tiết sản phẩm, xem trước phí vận chuyển)
  # và đếm số lần đăng nhập sai để chống spam/brute-force ở Auth Service. Toàn bộ dữ liệu đều
  # có TTL ngắn (vài phút) nên không cần volume bền vững — mất dữ liệu cache chỉ khiến lần đọc
  # kế tiếp rơi về DB/tính toán lại, không ảnh hưởng tính đúng đắn nghiệp vụ.
  redis:
    image: redis:7-alpine
    container_name: tttn_redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  # 1. Khởi tạo Database cho Auth Service
  mysql-auth:
    image: mysql:8.0
    container_name: tttn_auth_db
    environment:
      MYSQL_ROOT_PASSWORD: secretpassword
      MYSQL_DATABASE: auth_db
    ports:
      - "3307:3306"
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -u root -p$${MYSQL_ROOT_PASSWORD}"]
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      # Ánh xạ file SQL từ trong auth-service vào Docker để tự chạy
      - ./auth-service/db-init/init.sql:/docker-entrypoint-initdb.d/init.sql
      - auth_db_data:/var/lib/mysql

  # 2. Khởi tạo Code Node.js
  auth-service:
    build:
      context: ./auth-service
    container_name: tttn_auth_service
    ports:
      - "3002:3001"
    volumes:
      - auth_uploads_data:/app/uploads
    environment:
      - PORT=3001
      - DB_HOST=mysql-auth
      - DB_USER=root
      - DB_PASSWORD=secretpassword
      - DB_NAME=auth_db
      - DB_PORT=3306
      - JWT_ACCESS_SECRET=change_me_access_secret
      - JWT_ACCESS_EXPIRES_IN=15m
      - JWT_REFRESH_SECRET=change_me_refresh_secret
      - JWT_REFRESH_EXPIRES_IN=30d
      - JWT_REFRESH_EXPIRES_IN_DAYS=30
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      # Phát sự kiện 'user.registered' lên Kafka để Notification Service lắng nghe và gửi
      # email chào mừng (xem auth-service/src/events/authEvents.publisher.js).
      - KAFKA_BROKERS=kafka:9092
      - KAFKA_CLIENT_ID=auth-service
    depends_on:
      mysql-auth:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy

  # 3. Khởi tạo Database cho Product Catalog Service
  mysql-product:
    image: mysql:8.0
    container_name: tttn_product_db
    environment:
      MYSQL_ROOT_PASSWORD: secretpassword
      MYSQL_DATABASE: product_db
    ports:
      - "3308:3306"
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -u root -p$${MYSQL_ROOT_PASSWORD}"]
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - ./product-service/db-init/init.sql:/docker-entrypoint-initdb.d/init.sql
      - product_db_data:/var/lib/mysql

  # 4. Khởi tạo Code Node.js cho Product Catalog Service
  product-service:
    build:
      context: ./product-service
    container_name: tttn_product_service
    ports:
      - "3003:3001"
    environment:
      - PORT=3001
      - DB_HOST=mysql-product
      - DB_USER=root
      - DB_PASSWORD=secretpassword
      - DB_NAME=product_db
      - DB_PORT=3306
      - JWT_ACCESS_SECRET=change_me_access_secret
      - KAFKA_BROKERS=kafka:9092
      - KAFKA_CLIENT_ID=product-service
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    volumes:
      # Lưu ảnh sản phẩm/biến thể admin tải lên qua POST /api/uploads/images — tách riêng khỏi
      # vòng đời container để ảnh không mất khi rebuild/redeploy (xem modules/uploads).
      - product_uploads_data:/app/uploads
    depends_on:
      mysql-product:
        condition: service_healthy
      kafka:
        condition: service_healthy
      redis:
        condition: service_healthy

  # 5. Khởi tạo Database cho Warehouse Service
  mysql-warehouse:
    image: mysql:8.0
    container_name: tttn_warehouse_db
    environment:
      MYSQL_ROOT_PASSWORD: secretpassword
      MYSQL_DATABASE: warehouse_db
    ports:
      - "3309:3306"
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -u root -p$${MYSQL_ROOT_PASSWORD}"]
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - ./warehouse-service/db-init/init.sql:/docker-entrypoint-initdb.d/init.sql
      - warehouse_db_data:/var/lib/mysql

  # 6. Khởi tạo Code Node.js cho Warehouse Service
  warehouse-service:
    build:
      context: ./warehouse-service
    container_name: tttn_warehouse_service
    ports:
      - "3004:3001"
    environment:
      - PORT=3001
      - DB_HOST=mysql-warehouse
      - DB_USER=root
      - DB_PASSWORD=secretpassword
      - DB_NAME=warehouse_db
      - DB_PORT=3306
      - JWT_ACCESS_SECRET=change_me_access_secret
      - STOCK_LOCK_TTL_MINUTES=15
      - KAFKA_BROKERS=kafka:9092
      - KAFKA_CLIENT_ID=warehouse-service
      - KAFKA_CONSUMER_GROUP_ID=warehouse-service-group
    depends_on:
      mysql-warehouse:
        condition: service_healthy
      kafka:
        condition: service_healthy

  # 7. Khởi tạo Database cho Cart Service
  mysql-cart:
    image: mysql:8.0
    container_name: tttn_cart_db
    environment:
      MYSQL_ROOT_PASSWORD: secretpassword
      MYSQL_DATABASE: cart_db
    ports:
      - "3310:3306"
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -u root -p$${MYSQL_ROOT_PASSWORD}"]
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - ./cart-service/db-init/init.sql:/docker-entrypoint-initdb.d/init.sql
      - cart_db_data:/var/lib/mysql

  # 8. Khởi tạo Code Node.js cho Cart Service
  cart-service:
    build:
      context: ./cart-service
    container_name: tttn_cart_service
    ports:
      - "3005:3001"
    environment:
      - PORT=3001
      - DB_HOST=mysql-cart
      - DB_USER=root
      - DB_PASSWORD=secretpassword
      - DB_NAME=cart_db
      - DB_PORT=3306
      - JWT_ACCESS_SECRET=change_me_access_secret
      - MAX_QUANTITY_PER_ITEM=100
      - KAFKA_BROKERS=kafka:9092
      - KAFKA_CLIENT_ID=cart-service
      - KAFKA_CONSUMER_GROUP_ID=cart-service-group
    depends_on:
      mysql-cart:
        condition: service_healthy
      kafka:
        condition: service_healthy

  # 9. Khởi tạo Database cho Order & Promotion Service
  mysql-order:
    image: mysql:8.0
    container_name: tttn_order_db
    environment:
      MYSQL_ROOT_PASSWORD: secretpassword
      MYSQL_DATABASE: order_db
    ports:
      - "3311:3306"
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -u root -p$${MYSQL_ROOT_PASSWORD}"]
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - ./order-service/db-init/init.sql:/docker-entrypoint-initdb.d/init.sql
      - order_db_data:/var/lib/mysql

  # 10. Khởi tạo Code Node.js cho Order & Promotion Service
  order-service:
    build:
      context: ./order-service
    container_name: tttn_order_service
    ports:
      - "3006:3001"
    environment:
      - PORT=3001
      - DB_HOST=mysql-order
      - DB_USER=root
      - DB_PASSWORD=secretpassword
      - DB_NAME=order_db
      - DB_PORT=3306
      - JWT_ACCESS_SECRET=change_me_access_secret
      - KAFKA_BROKERS=kafka:9092
      - KAFKA_CLIENT_ID=order-service
      - KAFKA_CONSUMER_GROUP_ID=order-service-group
      # Gọi sang Warehouse Service qua mạng nội bộ Docker (tên service + cổng nội bộ 3001,
      # KHÔNG dùng cổng đã map ra host) để giữ/nhả/trừ tồn kho khi xử lý vòng đời đơn hàng.
      - WAREHOUSE_SERVICE_URL=http://warehouse-service:3001
      - DEFAULT_SHIPPING_FEE=30000
    depends_on:
      mysql-order:
        condition: service_healthy
      kafka:
        condition: service_healthy
      warehouse-service:
        condition: service_started

  # 11. Khởi tạo Database cho Payment Service
  mysql-payment:
    image: mysql:8.0
    container_name: tttn_payment_db
    environment:
      MYSQL_ROOT_PASSWORD: secretpassword
      MYSQL_DATABASE: payment_db
    ports:
      - "3312:3306"
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -u root -p$${MYSQL_ROOT_PASSWORD}"]
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - ./payment-service/db-init/init.sql:/docker-entrypoint-initdb.d/init.sql
      - payment_db_data:/var/lib/mysql

  # 12. Khởi tạo Code Node.js cho Payment Service
  payment-service:
    build:
      context: ./payment-service
    container_name: tttn_payment_service
    ports:
      - "3007:3001"
    environment:
      - PORT=3001
      - DB_HOST=mysql-payment
      - DB_USER=root
      - DB_PASSWORD=secretpassword
      - DB_NAME=payment_db
      - DB_PORT=3306
      - JWT_ACCESS_SECRET=change_me_access_secret
      - KAFKA_BROKERS=kafka:9092
      - KAFKA_CLIENT_ID=payment-service
      - KAFKA_CONSUMER_GROUP_ID=payment-service-group
      # Cấu hình VNPay — KHÔNG có tài khoản merchant thật nên trỏ VNPAY_PAY_URL
      # sang mock-vnpay-service (giả lập sandbox VNPay) để có thể test trọn luồng
      # thanh toán cục bộ. mock-vnpay-service ký/giải mã bằng đúng thuật toán
      # HMAC-SHA512 và dùng chung VNPAY_HASH_SECRET nên chữ ký luôn hợp lệ.
      # QUAN TRỌNG: VNPAY_PAY_URL phải là URL trình duyệt truy cập được (host machine),
      # KHÔNG dùng tên DNS nội bộ Docker (vd "mock-vnpay") — vì FE redirect bằng
      # window.location.href chạy trên trình duyệt của người dùng, trình duyệt không
      # phân giải được DNS nội bộ Docker (=> lỗi "trang web không tồn tại").
      # Đổi VNPAY_PAY_URL về https://sandbox.vnpayment.vn/paymentv2/vpcpay.html
      # khi có tài khoản merchant thật từ https://sandbox.vnpayment.vn.
      - VNPAY_TMN_CODE=change_me_tmn_code
      - VNPAY_HASH_SECRET=change_me_hash_secret
      - VNPAY_PAY_URL=http://localhost:3009/paymentv2/vpcpay.html
      - VNPAY_RETURN_URL=http://localhost:3000/checkout/payment-result
    depends_on:
      mysql-payment:
        condition: service_healthy
      kafka:
        condition: service_healthy
      order-service:
        condition: service_started

  # 12b. Mock VNPay sandbox — giả lập trang thanh toán + IPN webhook để test
  # luồng thanh toán end-to-end mà không cần tài khoản merchant VNPay thật.
  mock-vnpay:
    build:
      context: ./mock-vnpay-service
    container_name: tttn_mock_vnpay
    ports:
      - "3009:3001"
    environment:
      - PORT=3001
      - VNPAY_TMN_CODE=change_me_tmn_code
      - VNPAY_HASH_SECRET=change_me_hash_secret
      # Gọi IPN webhook của payment-service qua mạng nội bộ Docker (server-to-server,
      # đây là nguồn xác nhận thanh toán DUY NHẤT — redirect trình duyệt chỉ mang tính hiển thị).
      - PAYMENT_SERVICE_URL=http://payment-service:3001

  # 13. Khởi tạo Database cho Shipping Service
  mysql-shipping:
    image: mysql:8.0
    container_name: tttn_shipping_db
    environment:
      MYSQL_ROOT_PASSWORD: secretpassword
      MYSQL_DATABASE: shipping_db
    ports:
      - "3313:3306"
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -u root -p$${MYSQL_ROOT_PASSWORD}"]
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - ./shipping-service/db-init/init.sql:/docker-entrypoint-initdb.d/init.sql
      - shipping_db_data:/var/lib/mysql

  # 14. Khởi tạo Code Node.js cho Shipping Service
  shipping-service:
    build:
      context: ./shipping-service
    container_name: tttn_shipping_service
    ports:
      - "3008:3001"
    environment:
      - PORT=3001
      - DB_HOST=mysql-shipping
      - DB_USER=root
      - DB_PASSWORD=secretpassword
      - DB_NAME=shipping_db
      - DB_PORT=3306
      - JWT_ACCESS_SECRET=change_me_access_secret
      - KAFKA_BROKERS=kafka:9092
      - KAFKA_CLIENT_ID=shipping-service
      - KAFKA_CONSUMER_GROUP_ID=shipping-service-group
      # Cấu hình tính phí vận chuyển (mock GHTK/GHN — xem src/utils/shippingFee.js)
      - SHIPPING_BASE_FEE=16500
      - SHIPPING_INNER_ZONE_KEYWORDS=Hồ Chí Minh,TP.HCM,TP HCM,Ho Chi Minh,HCM
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    depends_on:
      mysql-shipping:
        condition: service_healthy
      kafka:
        condition: service_healthy
      order-service:
        condition: service_started
      redis:
        condition: service_healthy

  # 15. Notification Service — không có DB/REST API riêng, chỉ lắng nghe sự kiện từ
  # Auth/Order/Payment/Shipping Service qua Kafka rồi gửi email thông báo (Gmail SMTP qua App Password).
  # Tra cứu email người nhận qua GET /api/users/:id/contact (Auth Service) bằng "system token".
  notification-service:
    build:
      context: ./notification-service
    container_name: tttn_notification_service
    environment:
      - JWT_ACCESS_SECRET=change_me_access_secret
      - KAFKA_BROKERS=kafka:9092
      - KAFKA_CLIENT_ID=notification-service
      - KAFKA_CONSUMER_GROUP_ID=notification-service-group
      - AUTH_SERVICE_URL=http://auth-service:3001
      - MAIL_USERNAME=thuc7acxh@gmail.com
      - MAIL_PASSWORD=dowx azhz gawp impn
      - MAIL_FROM_NAME=TTTN Shop
    depends_on:
      kafka:
        condition: service_healthy
      auth-service:
        condition: service_started

  # 16. Frontend React (build với Vite, phục vụ qua Nginx — Nginx reverse-proxy /api/* tới từng service nội bộ)
  frontend:
    build:
      context: ./frontend
    container_name: tttn_frontend
    ports:
      - "3000:80"
    depends_on:
      - auth-service
      - product-service
      - warehouse-service
      - cart-service
      - order-service
      - payment-service
      - shipping-service
      - notification-service

volumes:
  auth_db_data:
  auth_uploads_data:
  product_db_data:
  product_uploads_data:
  warehouse_db_data:
  cart_db_data:
  order_db_data:
  payment_db_data:
  shipping_db_data:
  kafka_data: