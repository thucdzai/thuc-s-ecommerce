# ============================================================
#  TTTN Shop — chi can file nay, khong can gi them
#  Yeu cau: Docker Desktop da cai san
#  Chay: docker compose up -d
#  Mo trinh duyet: http://localhost:3000
# ============================================================

services:
  # --- Infrastructure ---
  kafka:
    image: apache/kafka:3.7.0
    container_name: tttn_kafka
    ports:
      - "9092:9092"
    environment:
      - KAFKA_NODE_ID=0
      - KAFKA_PROCESS_ROLES=controller,broker
      - KAFKA_LISTENERS=PLAINTEXT://:9092,CONTROLLER://:9093
      - KAFKA_ADVERTISED_LISTENERS=PLAINTEXT://kafka:9092
      - KAFKA_CONTROLLER_QUORUM_VOTERS=0@kafka:9093
      - KAFKA_CONTROLLER_LISTENER_NAMES=CONTROLLER
      - KAFKA_LISTENER_SECURITY_PROTOCOL_MAP=CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      - KAFKA_INTER_BROKER_LISTENER_NAME=PLAINTEXT
      - KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR=1
      - KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR=1
      - KAFKA_TRANSACTION_STATE_LOG_MIN_ISR=1
      - KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS=0
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-topics.sh --bootstrap-server localhost:9092 --list"]
      interval: 10s
      timeout: 10s
      retries: 10
    volumes:
      - kafka_data:/var/lib/kafka/data

  redis:
    image: redis:7-alpine
    container_name: tttn_redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  # --- Databases (SQL da duoc nhung san trong image) ---
  mysql-auth:
    image: sinhviennamhai/tttn-mysql-auth:latest
    container_name: tttn_auth_db
    environment:
      MYSQL_ROOT_PASSWORD: secretpassword
      MYSQL_DATABASE: auth_db
    ports:
      - "3307:3306"
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -u root -p$${MYSQL_ROOT_PASSWORD}"]
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - auth_db_data:/var/lib/mysql

  mysql-product:
    image: sinhviennamhai/tttn-mysql-product:latest
    container_name: tttn_product_db
    environment:
      MYSQL_ROOT_PASSWORD: secretpassword
      MYSQL_DATABASE: product_db
    ports:
      - "3308:3306"
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -u root -p$${MYSQL_ROOT_PASSWORD}"]
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - product_db_data:/var/lib/mysql

  mysql-warehouse:
    image: sinhviennamhai/tttn-mysql-warehouse:latest
    container_name: tttn_warehouse_db
    environment:
      MYSQL_ROOT_PASSWORD: secretpassword
      MYSQL_DATABASE: warehouse_db
    ports:
      - "3309:3306"
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -u root -p$${MYSQL_ROOT_PASSWORD}"]
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - warehouse_db_data:/var/lib/mysql

  mysql-cart:
    image: sinhviennamhai/tttn-mysql-cart:latest
    container_name: tttn_cart_db
    environment:
      MYSQL_ROOT_PASSWORD: secretpassword
      MYSQL_DATABASE: cart_db
    ports:
      - "3310:3306"
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -u root -p$${MYSQL_ROOT_PASSWORD}"]
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - cart_db_data:/var/lib/mysql

  mysql-order:
    image: sinhviennamhai/tttn-mysql-order:latest
    container_name: tttn_order_db
    environment:
      MYSQL_ROOT_PASSWORD: secretpassword
      MYSQL_DATABASE: order_db
    ports:
      - "3311:3306"
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -u root -p$${MYSQL_ROOT_PASSWORD}"]
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - order_db_data:/var/lib/mysql

  mysql-payment:
    image: sinhviennamhai/tttn-mysql-payment:latest
    container_name: tttn_payment_db
    environment:
      MYSQL_ROOT_PASSWORD: secretpassword
      MYSQL_DATABASE: payment_db
    ports:
      - "3312:3306"
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -u root -p$${MYSQL_ROOT_PASSWORD}"]
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - payment_db_data:/var/lib/mysql

  mysql-shipping:
    image: sinhviennamhai/tttn-mysql-shipping:latest
    container_name: tttn_shipping_db
    environment:
      MYSQL_ROOT_PASSWORD: secretpassword
      MYSQL_DATABASE: shipping_db
    ports:
      - "3313:3306"
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -u root -p$${MYSQL_ROOT_PASSWORD}"]
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - shipping_db_data:/var/lib/mysql

  # --- Application Services ---
  auth-service:
    image: sinhviennamhai/tttn-auth-service:latest
    container_name: tttn_auth_service
    ports:
      - "3002:3001"
    volumes:
      - auth_uploads_data:/app/uploads
    environment:
      - PORT=3001
      - DB_HOST=mysql-auth
      - DB_USER=root
      - DB_PASSWORD=secretpassword
      - DB_NAME=auth_db
      - DB_PORT=3306
      - JWT_ACCESS_SECRET=change_me_access_secret
      - JWT_ACCESS_EXPIRES_IN=15m
      - JWT_REFRESH_SECRET=change_me_refresh_secret
      - JWT_REFRESH_EXPIRES_IN=30d
      - JWT_REFRESH_EXPIRES_IN_DAYS=30
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - KAFKA_BROKERS=kafka:9092
      - KAFKA_CLIENT_ID=auth-service
    depends_on:
      mysql-auth:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy

  product-service:
    image: sinhviennamhai/tttn-product-service:latest
    container_name: tttn_product_service
    ports:
      - "3003:3001"
    volumes:
      - product_uploads_data:/app/uploads
    environment:
      - PORT=3001
      - DB_HOST=mysql-product
      - DB_USER=root
      - DB_PASSWORD=secretpassword
      - DB_NAME=product_db
      - DB_PORT=3306
      - JWT_ACCESS_SECRET=change_me_access_secret
      - KAFKA_BROKERS=kafka:9092
      - KAFKA_CLIENT_ID=product-service
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    depends_on:
      mysql-product:
        condition: service_healthy
      kafka:
        condition: service_healthy
      redis:
        condition: service_healthy

  warehouse-service:
    image: sinhviennamhai/tttn-warehouse-service:latest
    container_name: tttn_warehouse_service
    ports:
      - "3004:3001"
    environment:
      - PORT=3001
      - DB_HOST=mysql-warehouse
      - DB_USER=root
      - DB_PASSWORD=secretpassword
      - DB_NAME=warehouse_db
      - DB_PORT=3306
      - JWT_ACCESS_SECRET=change_me_access_secret
      - STOCK_LOCK_TTL_MINUTES=15
      - KAFKA_BROKERS=kafka:9092
      - KAFKA_CLIENT_ID=warehouse-service
      - KAFKA_CONSUMER_GROUP_ID=warehouse-service-group
    depends_on:
      mysql-warehouse:
        condition: service_healthy
      kafka:
        condition: service_healthy

  cart-service:
    image: sinhviennamhai/tttn-cart-service:latest
    container_name: tttn_cart_service
    ports:
      - "3005:3001"
    environment:
      - PORT=3001
      - DB_HOST=mysql-cart
      - DB_USER=root
      - DB_PASSWORD=secretpassword
      - DB_NAME=cart_db
      - DB_PORT=3306
      - JWT_ACCESS_SECRET=change_me_access_secret
      - MAX_QUANTITY_PER_ITEM=100
      - KAFKA_BROKERS=kafka:9092
      - KAFKA_CLIENT_ID=cart-service
      - KAFKA_CONSUMER_GROUP_ID=cart-service-group
    depends_on:
      mysql-cart:
        condition: service_healthy
      kafka:
        condition: service_healthy

  order-service:
    image: sinhviennamhai/tttn-order-service:latest
    container_name: tttn_order_service
    ports:
      - "3006:3001"
    environment:
      - PORT=3001
      - DB_HOST=mysql-order
      - DB_USER=root
      - DB_PASSWORD=secretpassword
      - DB_NAME=order_db
      - DB_PORT=3306
      - JWT_ACCESS_SECRET=change_me_access_secret
      - KAFKA_BROKERS=kafka:9092
      - KAFKA_CLIENT_ID=order-service
      - KAFKA_CONSUMER_GROUP_ID=order-service-group
      - WAREHOUSE_SERVICE_URL=http://warehouse-service:3001
      - DEFAULT_SHIPPING_FEE=30000
    depends_on:
      mysql-order:
        condition: service_healthy
      kafka:
        condition: service_healthy
      warehouse-service:
        condition: service_started

  payment-service:
    image: sinhviennamhai/tttn-payment-service:latest
    container_name: tttn_payment_service
    ports:
      - "3007:3001"
    environment:
      - PORT=3001
      - DB_HOST=mysql-payment
      - DB_USER=root
      - DB_PASSWORD=secretpassword
      - DB_NAME=payment_db
      - DB_PORT=3306
      - JWT_ACCESS_SECRET=change_me_access_secret
      - KAFKA_BROKERS=kafka:9092
      - KAFKA_CLIENT_ID=payment-service
      - KAFKA_CONSUMER_GROUP_ID=payment-service-group
      - VNPAY_TMN_CODE=change_me_tmn_code
      - VNPAY_HASH_SECRET=change_me_hash_secret
      - VNPAY_PAY_URL=http://localhost:3009/paymentv2/vpcpay.html
      - VNPAY_RETURN_URL=http://localhost:3000/checkout/payment-result
    depends_on:
      mysql-payment:
        condition: service_healthy
      kafka:
        condition: service_healthy
      order-service:
        condition: service_started

  mock-vnpay:
    image: sinhviennamhai/tttn-mock-vnpay:latest
    container_name: tttn_mock_vnpay
    ports:
      - "3009:3001"
    environment:
      - PORT=3001
      - VNPAY_TMN_CODE=change_me_tmn_code
      - VNPAY_HASH_SECRET=change_me_hash_secret
      - PAYMENT_SERVICE_URL=http://payment-service:3001

  shipping-service:
    image: sinhviennamhai/tttn-shipping-service:latest
    container_name: tttn_shipping_service
    ports:
      - "3008:3001"
    environment:
      - PORT=3001
      - DB_HOST=mysql-shipping
      - DB_USER=root
      - DB_PASSWORD=secretpassword
      - DB_NAME=shipping_db
      - DB_PORT=3306
      - JWT_ACCESS_SECRET=change_me_access_secret
      - KAFKA_BROKERS=kafka:9092
      - KAFKA_CLIENT_ID=shipping-service
      - KAFKA_CONSUMER_GROUP_ID=shipping-service-group
      - SHIPPING_BASE_FEE=16500
      - SHIPPING_INNER_ZONE_KEYWORDS=Ho Chi Minh,TP.HCM,TP HCM,Ho Chi Minh,HCM
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    depends_on:
      mysql-shipping:
        condition: service_healthy
      kafka:
        condition: service_healthy
      order-service:
        condition: service_started
      redis:
        condition: service_healthy

  notification-service:
    image: sinhviennamhai/tttn-notification-service:latest
    container_name: tttn_notification_service
    environment:
      - JWT_ACCESS_SECRET=change_me_access_secret
      - KAFKA_BROKERS=kafka:9092
      - KAFKA_CLIENT_ID=notification-service
      - KAFKA_CONSUMER_GROUP_ID=notification-service-group
      - AUTH_SERVICE_URL=http://auth-service:3001
      # Tu dien: Gmail + App Password (Cai dat Google > Bao mat > Mat khau ung dung)
      - MAIL_USERNAME=your_gmail@gmail.com
      - MAIL_PASSWORD=your_gmail_app_password
      - MAIL_FROM_NAME=TTTN Shop
    depends_on:
      kafka:
        condition: service_healthy
      auth-service:
        condition: service_started

  frontend:
    image: sinhviennamhai/tttn-frontend:latest
    container_name: tttn_frontend
    ports:
      - "3000:80"
    depends_on:
      - auth-service
      - product-service
      - warehouse-service
      - cart-service
      - order-service
      - payment-service
      - shipping-service
      - notification-service

volumes:
  auth_db_data:
  auth_uploads_data:
  product_db_data:
  product_uploads_data:
  warehouse_db_data:
  cart_db_data:
  order_db_data:
  payment_db_data:
  shipping_db_data:
  kafka_data:
